<!DOCTYPE html>
<html>
<head>
  <title>Create Listing - TX Console</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Create a New Market Listing</h2>
  <form method="POST" action="/create_listing">
    <div class="form-group">
      <label>File Path</label>
      <input type="text" name="file_path" class="form-control" placeholder="/path/to/file.txt" required>
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" step="0.001" name="price" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Duration (Days)</label>
      <input type="number" name="duration_days" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control" required></textarea>
    </div>
    <!-- Provide the deployed market contract hash -->
    <input type="hidden" name="contract_hash" value="3df7fc2d0fbfbd44798c356c35fd07f16dd0f91fd86e08c8b061cce2c55091f2">
    <button type="submit" class="btn btn-primary">Create Listing</button>
  </form>
  <a href="/marketplace" class="btn btn-secondary mt-3">Back to Marketplace</a>
</div>
</body>
</html>
